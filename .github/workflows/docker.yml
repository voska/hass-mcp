name: Docker Build & Push (edge)

# Tracks master HEAD as :edge. Release-tagged images (:latest, :X.Y.Z) are
# built by release.yml on tag push to keep the release pipeline atomic.

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOCKER_IMAGE: voska/hass-mcp
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  test:
    uses: ./.github/workflows/test.yml

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # Immutable SHA reference
            type=sha,format=long
            # :edge tracks master HEAD
            type=raw,value=edge

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
